name: 'Reset PR comment to pending'
description: 'Resets the automated bot PR comment to pending for format and lint reports'
inputs:
  pr_number:
    description: 'Pull Request number'
    required: true
runs:
  using: "composite"
  steps:
    - name: Reset PR comment
      uses: actions/github-script@v7
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
      with:
        script: |
          const marker = '<!-- clang-tidy-report -->';
          const prNumber = Number(process.env.PR_NUMBER);

          const body = [
            marker,
            '## clang-tidy report',
            ':hourglass_flowing_sand: **Running...**',
            '',
            '## format check report',
            ':hourglass_flowing_sand: **Running...**',
            '',
            '_This comment is updated automatically by CI._'
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            per_page: 100
          });

          const existingComments = comments.filter(c =>
            c.user?.type === 'Bot' && c.body?.includes(marker)
          );

          if (existingComments.length > 0) {
            const latest = existingComments[existingComments.length - 1];
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: latest.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });
          }
